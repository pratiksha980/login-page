<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <div class="login-wrapper">
        <h2>Agent Login</h2>
        <p class="p1">
          Hey, Enter your details to sign in <br /><span class="s1"
            >to your account</span
          >
        </p>
        <input id="email" type="text" placeholder="Enter email/Phone no" />
        <input id="password" type="password" placeholder="password" />
        <h4>Having trouble in sign in?</h4>
        <button id="signin-btn">Sign in</button>
        <p id="p2">-Or Sign in with-</p>
        <div class="btn-wrapper">
          <button class="btn">
            <img
              class="logo"
              src="google-black-icon.png"
              alt="google logo"
            /><span>Google</span>
          </button>
          <button class="btn">
            <img
              class="logo"
              src="apple-black-logo.png"
              alt="apple logo"
            /><span>Apple</span>
          </button>
          <button class="btn">
            <img class="logo" src="facebook.png" alt="facebook logo" /><span
              >Facebook</span
            >
          </button>
        </div>
        <p>Dont have an account? <span class="sp2">Request Now</span></p>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
